<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Digital Profile | Business Card</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Icons & QR Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --gold-primary: #D4AF37;
            --gold-light: #FDF5A9;
            --gold-dark: #AA7C11;
            --bg-main: #030303;
            --card-bg: #0C0C0C;
            --text-main: #FFFFFF;
            --text-sub: #A0A0A0;
            --border-glass: rgba(212, 175, 55, 0.2);
            --bg-glass: rgba(255, 255, 255, 0.02);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex; justify-content: center;
            min-height: 100vh; padding: 25px 15px;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(212, 175, 55, 0.03) 0%, transparent 40%);
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 45px; height: 45px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top-color: var(--gold-primary);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        /* Main Card */
        .vcard-container {
            width: 100%; max-width: 420px;
            background: var(--card-bg);
            border-radius: 35px;
            border: 1px solid var(--border-glass);
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            position: relative; overflow: hidden;
            opacity: 0; transform: translateY(30px);
            transition: all 0.8s ease;
        }
        .vcard-container.ready { opacity: 1; transform: translateY(0); }

        /* Header / Banner */
        .hero-banner {
            height: 170px; position: relative;
            background: linear-gradient(to bottom, #111, #000);
        }
        .hero-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        
        .top-actions {
            position: absolute; top: 20px; right: 20px;
            display: flex; gap: 10px; z-index: 10;
        }
        .action-icon-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            border: 1px solid var(--border-glass);
            display: flex; justify-content: center; align-items: center;
            color: var(--gold-primary); cursor: pointer; transition: 0.3s;
        }
        .action-icon-btn:hover { background: var(--gold-primary); color: #000; }

        /* Profile Details */
        .profile-content {
            text-align: center; padding: 0 25px;
            margin-top: -80px; position: relative; z-index: 5;
        }
        .avatar-box { position: relative; display: inline-block; margin-bottom: 15px; }
        .profile-avatar {
            width: 140px; height: 140px;
            border-radius: 50%; border: 4px solid var(--card-bg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            object-fit: cover; background: #222;
        }
        .badge {
            position: absolute; bottom: 8px; right: 8px;
            background: var(--gold-primary); color: #000;
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            border: 3px solid var(--card-bg); font-size: 12px;
        }

        .user-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem; font-weight: 700;
            color: var(--gold-light); margin-bottom: 5px;
        }
        .user-title {
            font-size: 0.8rem; text-transform: uppercase;
            letter-spacing: 2px; color: var(--gold-primary);
            font-weight: 500; margin-bottom: 25px;
        }

        /* Quick Links Grid */
        .quick-links {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; margin-bottom: 35px;
        }
        .q-link {
            text-decoration: none; display: flex; flex-direction: column; align-items: center;
        }
        .q-icon {
            width: 55px; height: 55px; border-radius: 18px;
            background: var(--bg-glass); border: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.3rem; color: var(--text-main); transition: 0.3s;
        }
        .q-link span { font-size: 0.65rem; color: var(--text-sub); margin-top: 8px; text-transform: uppercase; letter-spacing: 1px;}
        
        .q-link:hover .q-icon {
            background: var(--gold-primary); color: #000; border-color: var(--gold-primary);
            transform: translateY(-5px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        /* Primary Button */
        .btn-primary {
            width: 100%; padding: 18px; border-radius: 16px;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
            border: none; color: #000; font-size: 1rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; transition: 0.3s; margin-bottom: 40px;
            letter-spacing: 1px; box-shadow: 0 15px 30px rgba(212, 175, 55, 0.15);
        }
        .btn-primary:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Information List */
        .section-title {
            font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 2px; color: var(--text-sub);
            margin-bottom: 15px; text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;
        }

        .details-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 40px; }
        .detail-card {
            display: flex; align-items: center; gap: 15px;
            background: var(--bg-glass); padding: 16px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.03); transition: 0.3s;
        }
        .detail-card:hover { border-color: var(--border-glass); background: rgba(255,255,255,0.04); }
        .d-icon { color: var(--gold-primary); font-size: 1.1rem; width: 25px; text-align: center; }
        .d-info h6 { font-size: 0.65rem; color: var(--text-sub); text-transform: uppercase; margin-bottom: 4px; }
        .d-info a, .d-info p { color: var(--text-main); font-size: 0.95rem; text-decoration: none; font-weight: 400; }

        /* QR Code Modal */
        #modal-qr {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 10000;
            backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.3s;
        }
        .modal-content {
            background: #111; padding: 35px; border-radius: 25px; text-align: center;
            border: 1px solid var(--border-glass); max-width: 300px; width: 90%;
            transform: scale(0.9); transition: transform 0.3s;
        }
        .modal-content h3 { color: var(--gold-light); margin-bottom: 20px; font-family: 'Playfair Display', serif;}
        #qr-box { background: #fff; padding: 15px; border-radius: 15px; display: inline-block; margin-bottom: 20px; }
        .btn-close { 
            background: transparent; color: var(--gold-primary); border: 1px solid var(--gold-primary); 
            padding: 10px 30px; border-radius: 10px; cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn-close:hover { background: var(--gold-primary); color: #000; }

        /* Custom Toast Notification (Premium UX) */
        #toast {
            position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%);
            background: #1A1A1A; color: var(--gold-primary);
            padding: 12px 25px; border-radius: 30px; border: 1px solid var(--border-glass);
            font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 10001; transition: bottom 0.4s ease;
        }
        #toast.show { bottom: 30px; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Loading Animation -->
    <div id="loading-screen">
        <div class="spinner"></div>
    </div>

    <!-- Main Content -->
    <div class="vcard-container" id="app-container">
        
        <div class="hero-banner">
            <img id="dom-cover" src="" class="hero-img" alt="Cover">
            <div class="top-actions">
                <div class="action-icon-btn" onclick="toggleQR(true)"><i class="fa-solid fa-qrcode"></i></div>
                <div class="action-icon-btn" onclick="shareCard()"><i class="fa-solid fa-share-nodes"></i></div>
            </div>
        </div>

        <div class="profile-content">
            <div class="avatar-box">
                <img id="dom-avatar" src="" class="profile-avatar" alt="Profile">
                <div class="badge"><i class="fa-solid fa-check"></i></div>
            </div>
            
            <h1 class="user-name" id="dom-name">Loading...</h1>
            <p class="user-title" id="dom-title">Loading...</p>

            <div class="quick-links">
                <a href="#" id="act-call" class="q-link"><div class="q-icon"><i class="fa-solid fa-phone"></i></div><span>Call</span></a>
                <a href="#" id="act-msg" class="q-link"><div class="q-icon"><i class="fa-brands fa-whatsapp"></i></div><span>Message</span></a>
                <a href="#" id="act-mail" class="q-link"><div class="q-icon"><i class="fa-solid fa-envelope"></i></div><span>Email</span></a>
                <a href="#" id="act-map" class="q-link"><div class="q-icon"><i class="fa-solid fa-location-arrow"></i></div><span>Location</span></a>
            </div>

            <button class="btn-primary" onclick="generateVCF()">
                <i class="fa-solid fa-user-plus"></i> ADD TO CONTACTS
            </button>

            <div class="section-title">Contact Information</div>
            <div class="details-list" id="dom-info-list">
                <!-- Rendered dynamically -->
            </div>
        </div>

    <!-- QR Code Modal -->
    <div id="modal-qr" onclick="toggleQR(false)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>Scan to Connect</h3>
            <div id="qr-box"></div>
            <button class="btn-close" onclick="toggleQR(false)">Dismiss</button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast"><i class="fa-solid fa-circle-check"></i> <span>Contact Saved Successfully!</span></div>

    <!-- 
    ===================================================================
    CLIENT DATA SETUP AREA
    (আপনার ক্লায়েন্টের তথ্য এখানে বসাবেন)
    ===================================================================
    -->
    <script>
        // এই অংশটুকু তোমার কোডের নিচের দিকে আছে, সেখানে গিয়ে পরিবর্তন করো
const clientData = {
    basics: {
        name: "Meer Ashikul Islam", // এখানে তোমার নাম দাও
        designation: "Web Developer", 
        company: "Elite Tech", 
        avatar: "images/profile.jpg", 
        cover: "images/cover.jpg"     // তোমার পিসির images ফোল্ডারের ভেতর থাকা কভার ফটোর নাম
    },
    contactInfo: {
        phone: "+8801835826375", // তোমার ফোন নম্বর
        whatsapp: "8801835826375", // প্লাস (+) ছাড়া হোয়াটসঅ্যাপ নম্বর
        email: "shoeb@example.com",
        website: "www.yourbrand.com",
        address: "Chattogram, Bangladesh",
        mapLink: "https://maps.app.goo.gl/L6eUcQ3SofER8sxUA" // তোমার লোকেশন লিঙ্ক
    }
};

        // ===================================================================
        // SYSTEM LOGIC
        // ===================================================================
        
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Data Mapping
            document.getElementById('dom-name').innerText = clientData.basics.name;
            document.getElementById('dom-title').innerText = `${clientData.basics.designation} | ${clientData.basics.company}`;
            document.getElementById('dom-avatar').src = clientData.basics.avatar;
            document.getElementById('dom-cover').src = clientData.basics.cover;

            // 2. Action Links
            document.getElementById('act-call').href = `tel:${clientData.contactInfo.phone}`;
            document.getElementById('act-msg').href = `https://wa.me/${clientData.contactInfo.whatsapp}`;
            document.getElementById('act-mail').href = `mailto:${clientData.contactInfo.email}`;
            document.getElementById('act-map').href = clientData.contactInfo.mapLink;

            // 3. Render Information List
            const listContainer = document.getElementById('dom-info-list');
            const dataArray = [
                { icon: 'fa-phone', title: 'Mobile Number', val: clientData.contactInfo.phone, url: `tel:${clientData.contactInfo.phone}` },
                { icon: 'fa-envelope', title: 'Email Address', val: clientData.contactInfo.email, url: `mailto:${clientData.contactInfo.email}` },
                { icon: 'fa-globe', title: 'Website', val: clientData.contactInfo.website, url: `https://${clientData.contactInfo.website}` },
                { icon: 'fa-map-pin', title: 'Office Location', val: clientData.contactInfo.address, url: clientData.contactInfo.mapLink }
            ];

            dataArray.forEach(item => {
                listContainer.innerHTML += `
                    <div class="detail-card">
                        <div class="d-icon"><i class="fa-solid ${item.icon}"></i></div>
                        <div class="d-info">
                            <h6>${item.title}</h6>
                            <a href="${item.url}" target="_blank">${item.val}</a>
                        </div>
                    </div>
                `;
            });

            // 4. QR Code Generation
            try {
                const qrContainer = document.getElementById("qr-box");
                qrContainer.innerHTML = ""; // Clear existing just in case
                new QRCode(qrContainer, {
                    text: window.location.href,
                    width: 180, height: 180,
                    colorDark : "#000000", colorLight : "#ffffff"
                });
            } catch (err) {
                console.warn("QR Code generation delayed.");
            }

            // 5. Remove Loader
            setTimeout(() => {
                const loader = document.getElementById('loading-screen');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    document.getElementById('app-container').classList.add('ready');
                }, 500);
            }, 800);
        });

        // ===================================================================
        // PREMIUM FEATURES
        // ===================================================================

        function generateVCF() {
            const vcfTemplate = `BEGIN:VCARD
VERSION:3.0
FN:${clientData.basics.name}
ORG:${clientData.basics.company}
TITLE:${clientData.basics.designation}
TEL;TYPE=WORK,VOICE:${clientData.contactInfo.phone}
EMAIL;TYPE=PREF,INTERNET:${clientData.contactInfo.email}
URL:${clientData.contactInfo.website}
ADR;TYPE=WORK:;;${clientData.contactInfo.address}
END:VCARD`;

            try {
                const blob = new Blob([vcfTemplate], { type: 'text/vcard' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${clientData.basics.name.replace(/\s+/g, '_')}.vcf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                showToast();
            } catch (error) {
                console.error("VCF Error:", error);
            }
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.classList.add("show");
            setTimeout(() => { toast.classList.remove("show"); }, 3000);
        }

        function shareCard() {
            if (navigator.share) {
                navigator.share({
                    title: `${clientData.basics.name} - Digital Profile`,
                    text: `Check out the digital business profile of ${clientData.basics.name}`,
                    url: window.location.href
                }).catch((error) => console.log('Sharing canceled or failed.'));
            } else {
                prompt("Copy this link to share the profile:", window.location.href);
            }
        }

        function toggleQR(show) {
            const modal = document.getElementById('modal-qr');
            const content = modal.querySelector('.modal-content');
            if (show) {
                modal.style.display = 'flex';
                setTimeout(() => { 
                    modal.style.opacity = '1'; 
                    content.style.transform = 'scale(1)';
                }, 10);
            } else {
                modal.style.opacity = '0';
                content.style.transform = 'scale(0.9)';
                setTimeout(() => { modal.style.display = 'none'; }, 300);
            }
        }
    </script>
</body>
</html>
